version: "3.9"

services:
  # === CORE INFRASTRUCTURE ===
  postgres:
    image: pgvector/pgvector:pg16
    container_name: salas-postgres
    restart: always
    environment:
      POSTGRES_DB: ark95x_salas
      POSTGRES_USER: ${PG_USER:-ark95x}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-ark95x_flame_2026}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ark95x"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.18-community
    container_name: salas-neo4j
    restart: always
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-ark95x_flame_2026}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_memory_heap_max__size: "2G"
      NEO4J_dbms_memory_pagecache_size: "1G"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data

  redis:
    image: redis:7-alpine
    container_name: salas-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  ollama:
    image: ollama/ollama:latest
    container_name: salas-ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_ORIGINS=*
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: salas-litellm
    restart: always
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://ark95x:ark95x_flame_2026@postgres:5432/ark95x_salas
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ./config/litellm_config.yaml:/app/litellm_config.yaml
    depends_on:
      postgres:
        condition: service_healthy

  # === APPLICATION LAYER ===
  salas-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: salas-api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://ark95x:ark95x_flame_2026@postgres:5432/ark95x_salas
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-ark95x_flame_2026}
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_HOST=http://ollama:11434
      - LITELLM_BASE=http://litellm:4000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    ports:
      - "8095:8095"
    volumes:
      - ./:/app

  n8n:
    image: n8nio/n8n:latest
    container_name: salas-n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-ark95x_flame_2026}
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/Chicago
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_DATABASE=ark95x_salas
      - DB_POSTGRESDB_USER=ark95x
      - DB_POSTGRESDB_PASSWORD=ark95x_flame_2026
      - EXECUTIONS_MODE=queue
    volumes:
      - n8ndata:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy

  # === MONITORING ===
  prometheus:
    image: prom/prometheus:latest
    container_name: salas-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    container_name: salas-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-ark95x_flame_2026}
    volumes:
      - grafanadata:/var/lib/grafana

volumes:
  pgdata:
  neo4jdata:
  redisdata:
  ollama_models:
  n8ndata:
  grafanadata:
